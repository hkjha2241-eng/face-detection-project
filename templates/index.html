<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Face Detection Web UI</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        .container { max-width: 600px; margin: 0 auto; }
        .preview { max-width: 100%; margin-top: 20px; border-radius: 8px; display: none; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        input { margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Face Detection System</h2>
    
    <input type="file" id="imageInput" accept="image/*"><br>
    <button onclick="uploadAndDetect()">Detect Image</button>
    
    <br>
    <img id="resultImage" class="preview" alt="Detection Result">
</div>

<script>
async function uploadAndDetect() {
    const input = document.getElementById('imageInput');
    if (input.files.length === 0) {
        alert('Please select an image file first.');
        return;
    }

    const formData = new FormData();
    formData.append('image', input.files[0]);

    const response = await fetch('/detect', {
        method: 'POST',
        body: formData
    });

    const data = await response.json();
    
    if (data.result_image) {
        const img = document.getElementById('resultImage');
        img.src = data.result_image + '?t=' + new Date().getTime(); // Prevent browser caching
        img.style.display = 'inline-block';
    } else {
        alert('Error: ' + data.error);
    }
}
</script>

</body>
</html>
